<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Family HQ</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7c6aef">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family HQ">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0f0f1a;--sf:#1a1a2f;--cd:#212140;--bd:rgba(255,255,255,0.10);--tx:#e8e6f0;--ht:#9f9dba;--pr:#7c6aef;--pg:rgba(124,106,239,0.15);--ac:#ef6a7a;--ok:#5cd6a0;--wn:#f0c45a;--gd:linear-gradient(135deg,#5a4cd0,#7c6aef);--gtx:#fff;--r:20px;--r-sm:14px;--r-pill:999px;--nh:64px;--shadow-1:0 2px 12px rgba(0,0,0,.18);--shadow-2:0 8px 24px rgba(0,0,0,.22)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;padding-bottom:120px;-webkit-font-smoothing:antialiased}

/* Header — gradient icon square + title + subtitle */
.hd{padding:14px 20px 12px;padding-top:max(14px, calc(env(safe-area-inset-top, 0px) + 6px));background:color-mix(in srgb,var(--sf) 88%,transparent);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;gap:10px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hd-l{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.hd-ico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:linear-gradient(135deg,color-mix(in srgb,var(--pr) 38%,transparent),color-mix(in srgb,var(--pr) 10%,transparent));border:1px solid color-mix(in srgb,var(--pr) 45%,transparent);color:var(--pr);box-shadow:inset 0 1px 0 color-mix(in srgb,var(--pr) 20%,transparent),0 2px 10px color-mix(in srgb,var(--pr) 18%,transparent)}
.hd-tx{min-width:0;flex:1}
.hd h1{font-size:20px;font-weight:700;letter-spacing:-.3px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-s{font-size:11px;color:var(--ht);margin-top:2px;font-weight:500;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-r{display:flex;gap:2px;align-items:center;flex-shrink:0}
.hd-g{background:none;border:none;color:var(--ht);cursor:pointer;padding:6px;display:flex}.hd-g svg{width:22px;height:22px}

/* Search bar */
.sb{overflow:hidden;max-height:0;transition:max-height .25s ease,padding .25s ease;background:var(--sf);padding:0 20px;border-bottom:1px solid transparent}
.sb.open{max-height:56px;padding:0 20px 12px;border-bottom-color:var(--bd)}
.sb input{width:100%;padding:10px 16px;border-radius:12px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:14px;outline:none;font-family:inherit}
.sb input:focus{border-color:var(--pr)}.sb input::placeholder{color:var(--ht)}

/* Pull to refresh */
.ptr{text-align:center;height:0;overflow:hidden;transition:height .2s;color:var(--ht);font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:600}
.ptr.show{height:40px}
.ptr .spin{display:inline-block;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Nav */
.nv{display:flex;position:fixed;bottom:0;left:0;right:0;background:color-mix(in srgb,var(--sf) 85%,transparent);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--bd);height:var(--nh);z-index:20;align-items:center;padding:0 4px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 4px;background:none;border:none;color:var(--ht);font-size:9px;font-weight:500;cursor:pointer;transition:all .25s ease;position:relative;font-family:inherit;border-radius:12px}
.ni.a{color:var(--pr);font-weight:700}.ni svg{width:20px;height:20px;transition:transform .2s ease}
.ni.a svg{transform:scale(1.1)}
.nb{position:absolute;top:2px;right:calc(50% - 18px);min-width:18px;height:18px;border-radius:9px;background:var(--ac);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 0 0 2px var(--sf),0 2px 6px color-mix(in srgb,var(--ac) 35%,transparent);letter-spacing:.2px}

/* Content */
.ct{padding:14px 16px 24px}

/* Section headers — uppercase micro-label with counter pill */
.sc{font-size:11px;font-weight:700;color:var(--ht);text-transform:uppercase;letter-spacing:1.2px;margin:18px 0 10px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.sc .at{text-transform:none;letter-spacing:0;font-size:12px;color:var(--pr);background:none;border:none;cursor:pointer;font-weight:600;font-family:inherit}
.sc-cnt{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 6px;border-radius:9px;background:color-mix(in srgb,var(--ht) 18%,transparent);color:var(--ht);font-size:10px;font-weight:700;letter-spacing:0;margin-left:6px}
.sc-l{display:inline-flex;align-items:center;gap:6px}
.sc-ico{display:inline-flex;align-items:center;line-height:1;opacity:.95}

/* Cards */
.c{background:var(--cd);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;border:1px solid var(--bd);display:flex;align-items:center;gap:13px;transition:all .25s;animation:ci .3s ease-out;box-shadow:var(--shadow-1)}
.c.d{opacity:.35}

/* Premium list card — gradient icon + title + meta + trailing pill (subs/events/birthdays/upcoming) */
.lc{background:var(--cd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;border:1px solid var(--bd);display:flex;align-items:center;gap:14px;transition:transform .15s,box-shadow .25s;animation:ci .3s ease-out;box-shadow:var(--shadow-1)}
.lc:active{transform:scale(.985)}
/* Icon container — transparent accent gradient + soft border; emoji/SVG sits on a "frosted tint" instead of a heavy solid fill */
.lc-i{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:linear-gradient(135deg,color-mix(in srgb,var(--pr) 38%,transparent),color-mix(in srgb,var(--pr) 10%,transparent));border:1px solid color-mix(in srgb,var(--pr) 45%,transparent);color:var(--pr);box-shadow:inset 0 1px 0 color-mix(in srgb,var(--pr) 18%,transparent),0 2px 10px color-mix(in srgb,var(--pr) 14%,transparent)}
.lc-i.acc-ac{background:linear-gradient(135deg,color-mix(in srgb,var(--ac) 38%,transparent),color-mix(in srgb,var(--ac) 10%,transparent));border-color:color-mix(in srgb,var(--ac) 45%,transparent);color:var(--ac);box-shadow:inset 0 1px 0 color-mix(in srgb,var(--ac) 18%,transparent),0 2px 10px color-mix(in srgb,var(--ac) 14%,transparent)}
.lc-i.acc-ok{background:linear-gradient(135deg,color-mix(in srgb,var(--ok) 38%,transparent),color-mix(in srgb,var(--ok) 10%,transparent));border-color:color-mix(in srgb,var(--ok) 45%,transparent);color:var(--ok);box-shadow:inset 0 1px 0 color-mix(in srgb,var(--ok) 18%,transparent),0 2px 10px color-mix(in srgb,var(--ok) 14%,transparent)}
.lc-i.acc-wn{background:linear-gradient(135deg,color-mix(in srgb,var(--wn) 38%,transparent),color-mix(in srgb,var(--wn) 10%,transparent));border-color:color-mix(in srgb,var(--wn) 45%,transparent);color:var(--wn);box-shadow:inset 0 1px 0 color-mix(in srgb,var(--wn) 18%,transparent),0 2px 10px color-mix(in srgb,var(--wn) 14%,transparent)}
.lc-i.acc-pr{background:linear-gradient(135deg,color-mix(in srgb,var(--pr) 38%,transparent),color-mix(in srgb,var(--pr) 10%,transparent));border-color:color-mix(in srgb,var(--pr) 45%,transparent);color:var(--pr);box-shadow:inset 0 1px 0 color-mix(in srgb,var(--pr) 18%,transparent),0 2px 10px color-mix(in srgb,var(--pr) 14%,transparent)}
/* Settings row variant — slightly tighter, chevron at the end */
.lc-row{padding:12px 14px}
.lc-tap{cursor:pointer;transition:background .15s,transform .12s}
.lc-tap:active{transform:scale(.985);background:color-mix(in srgb,var(--tx) 4%,var(--cd))}
.lc-chev{flex-shrink:0;color:var(--ht);font-size:20px;font-weight:300;line-height:1;margin-left:2px;opacity:.7}
/* Member row in Settings */
.lc-mem{padding:12px 14px}
.lc-mem .lc-bd{gap:6px}
.lc-mem-strip{width:32px;height:4px;border-radius:2px;margin-top:2px}
/* Family invite code card */
.invite-card{background:linear-gradient(135deg,color-mix(in srgb,var(--pr) 14%,var(--cd)),var(--cd));border:1.5px dashed color-mix(in srgb,var(--pr) 50%,transparent);border-radius:18px;padding:16px;text-align:center;margin:4px 0 22px;box-shadow:var(--shadow-1)}
.invite-lb{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ht);margin-bottom:8px}
.invite-cd{font-size:30px;font-weight:800;letter-spacing:6px;color:var(--pr);font-variant-numeric:tabular-nums}
.invite-hint{font-size:11px;color:var(--ht);margin-top:6px;font-weight:500}
.lc-bd{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.lc-tt{font-size:15px;font-weight:600;color:var(--tx);line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lc-mt{font-size:12px;color:var(--ht);font-weight:500;line-height:1.3}
.lc-rt{display:inline-flex;align-items:center;padding:5px 11px;border-radius:var(--r-pill);background:color-mix(in srgb,var(--ht) 14%,transparent);color:var(--ht);font-size:11px;font-weight:600;letter-spacing:.2px;flex-shrink:0;white-space:nowrap}
.lc-rt.tone-ok{background:color-mix(in srgb,var(--ok) 16%,transparent);color:var(--ok)}
.lc-rt.tone-ac{background:color-mix(in srgb,var(--ac) 18%,transparent);color:var(--ac)}
.lc-rt.tone-wn{background:color-mix(in srgb,var(--wn) 18%,transparent);color:var(--wn)}

/* Meta pills (date / priority / reminders) on task cards */
.pdate{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--r-pill);background:color-mix(in srgb,var(--wn) 14%,transparent);color:var(--wn);font-size:11px;font-weight:600;letter-spacing:.1px}
.pdate.tone-ac{background:color-mix(in srgb,var(--ac) 14%,transparent);color:var(--ac)}
.pdate.tone-ok{background:color-mix(in srgb,var(--ok) 14%,transparent);color:var(--ok)}
.ppri{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700;letter-spacing:.2px}
.ppri.lo{background:color-mix(in srgb,var(--pri-lo) 14%,transparent);color:var(--pri-lo)}
.ppri.md{background:color-mix(in srgb,var(--pri-md) 16%,transparent);color:var(--pri-md)}
.ppri.hi{background:color-mix(in srgb,var(--pri-hi) 18%,transparent);color:var(--pri-hi)}
@keyframes ci{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Checkboxes */
.cb{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .25s}
.cb-o{border:1.5px solid var(--ht)}.cb-k{background:var(--ok);border:none}.cb-k svg{stroke:#fff}
.cb-s{width:20px;height:20px;border-radius:6px}

/* Card content */
.bd{flex:1;min-width:0}
.tt{font-size:15px;font-weight:500;line-height:1.3}
.tt.sk{text-decoration:line-through;color:var(--ht)}
.c-stk{border:1.5px solid var(--ok)}
.mt{font-size:12px;color:var(--ht);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* Badges & chips */
.bg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.ch{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s}
.ch.s{border-color:currentColor}.ch-s{padding:2px 7px;font-size:10px}

/* Buttons */
.bi{background:none;border:none;color:var(--ht);cursor:pointer;padding:5px;border-radius:8px;display:flex;transition:color .2s}.bi svg{width:15px;height:15px}
.btn{width:100%;padding:14px;border-radius:14px;background:var(--gd);color:var(--gtx,#fff);border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit;box-shadow:0 4px 16px color-mix(in srgb,var(--pr) 30%,transparent);transition:transform .15s,box-shadow .15s}
.btn:active{transform:scale(.98);box-shadow:0 2px 8px color-mix(in srgb,var(--pr) 25%,transparent)}
.btn-s{background:var(--cd);color:var(--tx);border:1.5px solid var(--bd);box-shadow:none}

/* Stats grid */
.sts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.sts-3{grid-template-columns:1fr 1fr 1fr;gap:8px}
.st{background:var(--cd);border-radius:18px;padding:14px 12px;border:1px solid var(--bd);cursor:pointer;transition:transform .15s;box-shadow:var(--shadow-1)}
.st:active{transform:scale(.97)}
.sn{font-size:26px;font-weight:800;line-height:1}
.sl{font-size:12px;color:var(--ht);margin-top:5px;font-weight:500}
/* Money stats tile — icon + uppercase label + big number */
.st-mn{text-align:left;padding:13px 12px}
.st-mn .st-ico{width:30px;height:30px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:8px;border:1px solid transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.st-mn .st-ico.tone-ok{background:linear-gradient(135deg,color-mix(in srgb,var(--ok) 38%,transparent),color-mix(in srgb,var(--ok) 8%,transparent));border-color:color-mix(in srgb,var(--ok) 42%,transparent);color:var(--ok)}
.st-mn .st-ico.tone-ac{background:linear-gradient(135deg,color-mix(in srgb,var(--ac) 38%,transparent),color-mix(in srgb,var(--ac) 8%,transparent));border-color:color-mix(in srgb,var(--ac) 42%,transparent);color:var(--ac)}
.st-mn .st-ico.tone-pr{background:linear-gradient(135deg,color-mix(in srgb,var(--pr) 38%,transparent),color-mix(in srgb,var(--pr) 8%,transparent));border-color:color-mix(in srgb,var(--pr) 42%,transparent);color:var(--pr)}
.st-mn .st-lb{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--ht);font-weight:700}
.st-mn .st-vl{font-size:16px;font-weight:800;letter-spacing:-.3px;margin-top:3px;line-height:1.15}
.st-mn .st-vl.pos{color:var(--ok)}
.st-mn .st-vl.neg{color:var(--ac)}
/* Polished chart bars (Last 6 Months) */
.chart-bars{display:flex;gap:6px;align-items:flex-end;height:108px;padding:8px 4px 0;margin-bottom:10px;background:var(--cd);border:1px solid var(--bd);border-radius:18px;box-shadow:var(--shadow-1)}
.chart-bars .cbar{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center}
.chart-bars .cbar-pair{display:flex;gap:3px;align-items:flex-end;justify-content:center;height:74px}
.chart-bars .cbar-b{width:9px;border-radius:3px 3px 0 0;min-height:3px;background:linear-gradient(180deg,var(--c1),var(--c2))}
.chart-bars .cbar-b.b-in{--c1:color-mix(in srgb,var(--ok),white 18%);--c2:var(--ok)}
.chart-bars .cbar-b.b-ex{--c1:color-mix(in srgb,var(--ac),white 18%);--c2:var(--ac)}
.chart-bars .cbar-lb{font-size:9px;color:var(--ht);margin-top:6px;font-weight:600;letter-spacing:.2px}
.chart-legend{display:flex;gap:14px;font-size:11px;color:var(--ht);margin-bottom:16px;padding:0 4px}
.chart-legend .dotk{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:-1px}
/* Category / Limit rows polished */
.cat-row{margin-bottom:10px;background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:10px 12px;box-shadow:var(--shadow-1)}
.cat-row-h{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:6px}
.cat-row-h .nm{font-weight:600;display:inline-flex;align-items:center;gap:6px}
.cat-row-h .nm .em{font-size:16px}
.cat-row-h .vl{font-weight:800;letter-spacing:-.2px;font-size:13px}
.cat-row .progress{height:6px;background:color-mix(in srgb,var(--bd) 60%,transparent);border-radius:3px;overflow:hidden}
.cat-row .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,color-mix(in srgb,var(--pr),white 18%),var(--pr));transition:width .5s ease}
.cat-row .progress-fill.tone-ok{background:linear-gradient(90deg,color-mix(in srgb,var(--ok),white 18%),var(--ok))}
.cat-row .progress-fill.tone-ac{background:linear-gradient(90deg,color-mix(in srgb,var(--ac),white 18%),var(--ac))}

/* FAB */
.fab{position:fixed;bottom:calc(var(--nh)+24px);right:18px;width:52px;height:52px;border-radius:16px;background:var(--gd);color:var(--gtx,#fff);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px color-mix(in srgb,var(--pr) 35%,transparent);z-index:15;transition:transform .2s,box-shadow .2s}
.fab:active{transform:scale(.88);box-shadow:0 3px 12px color-mix(in srgb,var(--pr) 25%,transparent)}.fab svg{width:22px;height:22px}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:flex-end;justify-content:center;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none}
.mo.op{opacity:1;pointer-events:auto}
.mx{background:var(--sf);border-radius:28px 28px 0 0;padding:24px 24px 38px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .35s cubic-bezier(.2,.9,.3,1);max-height:88vh;overflow-y:auto;box-shadow:0 -12px 48px rgba(0,0,0,.38);padding-bottom:max(38px,calc(env(safe-area-inset-bottom,0px) + 24px))}
.mx::before{content:'';display:block;width:44px;height:5px;border-radius:3px;background:color-mix(in srgb,var(--ht) 40%,transparent);margin:0 auto 18px}
.mo.op .mx{transform:translateY(0)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:12px}
.mt2{font-size:20px;font-weight:800;letter-spacing:-.3px;display:inline-flex;align-items:center;gap:10px;line-height:1.15}
.mt2-ico{width:34px;height:34px;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,color-mix(in srgb,var(--pr) 38%,transparent),color-mix(in srgb,var(--pr) 10%,transparent));border:1px solid color-mix(in srgb,var(--pr) 45%,transparent);color:var(--pr)}

/* Form elements */
.inp{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:15px;outline:none;margin-bottom:12px;box-sizing:border-box;font-family:inherit;transition:border-color .2s,box-shadow .2s,background .2s}
.inp:focus{border-color:var(--pr);background:var(--sf);box-shadow:0 0 0 3px color-mix(in srgb,var(--pr) 20%,transparent)}.inp::placeholder{color:var(--ht)}
input[type="date"],input[type="time"],input[type="number"],select{-webkit-appearance:none;appearance:none;width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:15px;font-family:inherit;outline:none;box-sizing:border-box;color-scheme:dark;transition:border-color .2s,box-shadow .2s,background .2s}
input[type="date"]:focus,input[type="time"]:focus,input[type="number"]:focus,select:focus{border-color:var(--pr);background:var(--sf);box-shadow:0 0 0 3px color-mix(in srgb,var(--pr) 20%,transparent)}
.ls input[type="date"],.ls input[type="time"],.ls select{color-scheme:light}
.dr{display:flex;gap:10px;margin-bottom:12px}.dr>div{flex:1}
.dl{font-size:11px;color:var(--ht);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.lb{font-size:11px;font-weight:700;color:var(--ht);margin-bottom:8px;text-transform:uppercase;letter-spacing:.9px}
.or{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ob{padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--ht);border:1.5px solid var(--bd);font-family:inherit;transition:all .15s}
.ob.s{color:var(--pr);background:linear-gradient(135deg,color-mix(in srgb,var(--pr) 24%,transparent),color-mix(in srgb,var(--pr) 8%,transparent));border-color:color-mix(in srgb,var(--pr) 55%,transparent);box-shadow:0 2px 8px color-mix(in srgb,var(--pr) 16%,transparent)}

/* Tabs */

/* Storm — dark turbulent sky with rain and lightning flashes */
.wbg-storm{background:radial-gradient(ellipse 130% 70% at 50% 30%,#2a3a52 0%,#172132 50%,#0a0f1a 100%),linear-gradient(180deg,#1a2535,#0a0f1a)}
.wbg-storm::before{background:repeating-linear-gradient(102deg,transparent 0,transparent 3px,rgba(140,180,255,.25) 3px,rgba(140,180,255,.01) 5px);background-size:18px 24px;animation:rainFall .4s linear infinite}
.wbg-storm::after{background:none;animation:lightning 7s ease-in-out infinite}
@keyframes lightning{0%,89%,93%,95%,100%{background:transparent}90%{background:rgba(200,220,255,.15)}92%{background:transparent}94%{background:rgba(180,200,255,.25)}}

/* Task complete — spring scale, then slide & fade */
@keyframes tkPop{0%{transform:scale(1)}30%{transform:scale(1.035)}60%{transform:scale(.97)}100%{transform:scale(1)}}
@keyframes tkGo{0%{transform:translateX(0) scale(1);opacity:1;max-height:80px;margin-bottom:10px;padding-top:13px;padding-bottom:13px;border-width:1px}70%{transform:translateX(38px) scale(.98);opacity:.1}100%{transform:translateX(60px) scale(.95);opacity:0;max-height:0;margin-bottom:0;padding-top:0;padding-bottom:0;border-width:0}}
.c.c-pop{animation:tkPop .28s cubic-bezier(.2,.9,.3,1.1)}
.c.c-go{animation:tkGo .42s cubic-bezier(.55,0,.3,1) forwards;overflow:hidden;pointer-events:none}
.cb.cb-k.cb-flash{box-shadow:0 0 0 6px color-mix(in srgb,var(--ok),transparent 70%);transition:box-shadow .3s}

/* Confetti burst (24 shards) */
.cf{position:fixed;width:0;height:0;pointer-events:none;z-index:60}
.cf i{position:absolute;left:-4px;top:-4px;width:7px;height:9px;border-radius:1px;animation:cFly .9s cubic-bezier(.15,.55,.3,1) forwards;will-change:transform,opacity}
@keyframes cFly{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--dx),var(--dy)) rotate(var(--r));opacity:0}}

/* Count-up number wrapper (just inline-block for clean metrics) */
.cu{display:inline-block;font-variant-numeric:tabular-nums}

/* Toggle micro-interactions: spring pop ONLY on actual click (via .pop class), not on re-render */
.ob,.ch,.fi,.tab{transition:background-color .2s,color .2s,border-color .2s,box-shadow .25s;will-change:transform}
.ob.pop,.ch.pop,.fi.pop,.tab.pop{animation:chPop .34s cubic-bezier(.2,.9,.3,1.3)}
@keyframes chPop{0%{transform:scale(.92)}45%{transform:scale(1.08)}72%{transform:scale(.98)}100%{transform:scale(1)}}
.ob:active,.ch:active,.fi:active,.tab:active{transform:scale(.93);transition:transform .08s}

/* Priority colors (semantic — gray / orange / red), override .ob.s default */
:root{--pri-lo:#8a8797;--pri-md:#f08a3c;--pri-hi:#e04656}
.ob-pri-low.s{color:var(--pri-lo);background:color-mix(in srgb,var(--pri-lo),transparent 82%);border-color:color-mix(in srgb,var(--pri-lo),transparent 55%);box-shadow:0 0 0 3px color-mix(in srgb,var(--pri-lo),transparent 88%)}
.ob-pri-normal.s{color:var(--pri-md);background:color-mix(in srgb,var(--pri-md),transparent 82%);border-color:color-mix(in srgb,var(--pri-md),transparent 55%);box-shadow:0 0 0 3px color-mix(in srgb,var(--pri-md),transparent 88%)}
.ob-pri-high.s{color:var(--pri-hi);background:color-mix(in srgb,var(--pri-hi),transparent 80%);border-color:color-mix(in srgb,var(--pri-hi),transparent 50%);box-shadow:0 0 0 3px color-mix(in srgb,var(--pri-hi),transparent 85%)}

/* Calendar */
.cal-mo{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column}
.cal-mo.open{display:flex}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;padding-top:max(10px, calc(env(safe-area-inset-top, 0px) + 4px));gap:8px}
.cal-hd-t{font-size:16px;font-weight:700;letter-spacing:-.3px}
.cal-nav{display:flex;align-items:center;gap:12px;flex:1;justify-content:center}
.cal-btn{background:var(--cd);border:1px solid var(--bd);color:var(--tx);cursor:pointer;width:38px;height:38px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;transition:transform .12s,background .15s;flex-shrink:0;box-shadow:var(--shadow-1)}
.cal-btn:active{transform:scale(.92);background:var(--sf)}
.cal-btn svg{width:16px;height:16px;stroke-width:2.5}
.cal-body{flex:1;overflow-y:auto;padding:4px 8px 14px;overscroll-behavior:contain}
.cal-grid-card{background:var(--cd);border:1px solid var(--bd);border-radius:22px;padding:6px 6px 10px;box-shadow:var(--shadow-1);margin-top:6px}
.cal-dh{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;font-weight:700;color:var(--ht);padding:10px 0 6px;text-transform:uppercase;letter-spacing:.8px}
.cal-wk{margin-bottom:2px;border-bottom:1px solid color-mix(in srgb,var(--bd) 60%,transparent)}.cal-wk:last-child{border-bottom:none}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
.cal-dy{padding:4px 0 2px;font-size:12px;font-weight:500;color:var(--ht);min-height:32px;display:flex;flex-direction:column;align-items:center;gap:1px;border-radius:6px;transition:background .15s}
.cal-dy.cur-m{color:var(--tx)}
.cal-dy.wkend{color:#e74c3c}
.cal-dy.today{color:var(--pr);font-weight:800}
.cal-dy .dn{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%}
.cal-dy.today .dn{background:var(--pr);color:#fff}
.cd-dots{display:flex;gap:2px;justify-content:center;height:4px}
.cd-dot{width:4px;height:4px;border-radius:50%;display:block}
.cal-wk-cur{background:color-mix(in srgb,var(--pr),transparent 93%);border-radius:8px}
.cal-bars{position:relative;min-height:4px;padding:0 1px}
.cal-ev{position:absolute;height:20px;border-radius:999px;font-size:9px;font-weight:700;line-height:18px;padding:0 8px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;transition:opacity .15s,background .15s;background:color-mix(in srgb,var(--cc,var(--pr)) 30%,var(--bg));color:var(--tx);border:1px solid color-mix(in srgb,var(--cc,var(--pr)) 65%,transparent)}
.cal-ev:active{opacity:.7}
.ev-ico{display:inline-flex;align-items:center;margin-right:3px;opacity:.95;vertical-align:middle}
.cal-ev.ev-done{text-decoration:line-through;opacity:.55}
/* 2-line wrapped variant — fits ~15 chars (2×~7) before ellipsis; used in the full month view */
.cal-ev.ev-2l{display:flex;align-items:flex-start;gap:4px;padding:4px 7px;white-space:normal;text-overflow:clip;line-height:13px;border-radius:10px}
.cal-ev.ev-2l .ev-ico{margin-right:0;flex-shrink:0;height:13px}
.cal-ev.ev-2l .ev-tx{flex:1;min-width:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-clamp:2;overflow:hidden;text-overflow:ellipsis;word-break:break-word}
@keyframes calSlideL{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes calSlideR{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
.cal-slide-l{animation:calSlideL .25s ease-out}
.cal-slide-r{animation:calSlideR .25s ease-out}
.cal-more{position:absolute;text-align:center;font-size:9px;font-weight:700;color:var(--ht);height:14px;line-height:14px}
.cal-dy{cursor:pointer}.cal-dy:active .dn{background:var(--sf)}
.cday-overlay{position:fixed;inset:0;background:var(--bg);z-index:65;display:flex;flex-direction:column;animation:fadeIn .15s}
.cday-panel{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.cday-hd{display:flex;align-items:center;gap:12px;padding:16px 20px;padding-top:max(16px, calc(env(safe-area-inset-top, 0px) + 6px));border-bottom:1px solid var(--bd)}
.cday-back{background:none;border:none;color:var(--tx);cursor:pointer;padding:4px}
.cday-title{font-size:17px;font-weight:700}
.cday-item{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;margin:0 12px;border-radius:12px;background:var(--cd);margin-top:8px;cursor:pointer;transition:background .15s}
.cday-item:active{background:var(--sf)}
.cday-bd{flex:1;min-width:0}
.cday-tt{font-size:15px;font-weight:600;color:var(--tx);line-height:1.3}
.cday-sub{font-size:12px;color:var(--ht);margin-top:3px}
.cal-ev.ev-pr{--cc:var(--pr)}
.cal-ev.ev-ac{--cc:var(--ac)}
.cal-ev.ev-ok{--cc:var(--ok)}
.cal-ev.ev-wn{--cc:var(--wn)}
.cal-ev.ev-sub{--cc:var(--ok);border-style:dashed}
.cal-ev.ev-rec{--cc:var(--ac);border-style:dashed}
.csh-week{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.csh-day{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 0;border-radius:8px;transition:background .15s}
.csh-day.csh-wkend{}
.csh-day.csh-today{background:color-mix(in srgb,var(--pr),transparent 85%)}
.csh-dn{font-size:9px;font-weight:600;color:var(--ht);text-transform:uppercase;letter-spacing:.3px}
.csh-num{font-size:14px;font-weight:600;color:var(--tx)}
.csh-day.csh-wkend .csh-dn,.csh-day.csh-wkend .csh-num{color:#e74c3c}
.csh-td{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--pr);color:#fff;font-weight:800}
.csh-sec{margin-top:6px}
.csh-label{font-size:11px;font-weight:700;color:var(--ht);text-transform:uppercase;letter-spacing:.3px}
.csh-item{display:flex;align-items:center;gap:9px;padding:7px 10px;margin-top:5px;border-radius:11px;background:color-mix(in srgb,var(--tx) 4%,transparent);transition:background .15s}
.csh-item:active{background:color-mix(in srgb,var(--tx) 8%,transparent)}
.csh-ico{flex-shrink:0;width:22px;height:22px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;line-height:1}
.csh-txt{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csh-more{font-size:11px;color:var(--ht);text-align:center;padding:4px 0}
.csh-empty{text-align:center;font-size:12px;color:var(--ht);padding:8px 0}
.csh-sum{text-align:center;font-size:11px;font-weight:600;color:var(--ht);padding:6px 0 0;letter-spacing:.2px;border-top:1px solid var(--bd);margin-top:6px}
.cal-chips{display:flex;gap:7px;padding:8px 2px 12px;flex-wrap:wrap;justify-content:center}
.cal-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:4px 4px 12px}
.cal-chip{font-size:12px;font-weight:700;padding:8px 14px;border-radius:999px;cursor:pointer;border:1.5px solid color-mix(in srgb,var(--cc) 70%,transparent);color:var(--cc);background:color-mix(in srgb,var(--cc) 14%,var(--bg));transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.2px;box-shadow:0 1px 3px rgba(0,0,0,.15);min-width:96px}
.cal-chip.on{background:linear-gradient(135deg,color-mix(in srgb,var(--cc) 28%,transparent),color-mix(in srgb,var(--cc) 10%,transparent));color:var(--cc);border-color:color-mix(in srgb,var(--cc) 75%,transparent);box-shadow:0 3px 12px color-mix(in srgb,var(--cc) 22%,transparent),inset 0 1px 0 color-mix(in srgb,var(--cc) 18%,transparent)}
.cal-chip:active{transform:scale(.94)}
.cal-chip-ico{display:inline-flex;align-items:center;line-height:1}
.cal-chip-sep{width:1px;background:var(--bd);margin:0 4px;align-self:stretch}
.ced-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:70;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .15s}
.ced-card{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:22px;max-width:320px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.ced-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ht);margin-bottom:4px}
.ced-title{font-size:17px;font-weight:700;color:var(--tx);margin-bottom:14px;line-height:1.3}
.ced-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--bd)}
.ced-lbl{font-size:12px;color:var(--ht);font-weight:500}
.ced-val{font-size:13px;font-weight:600;color:var(--tx);display:flex;align-items:center;gap:6px}
.ced-val.pr-high{color:var(--wn)}.ced-val.pr-low{color:var(--ht)}
/* Member filter row (bottom of calendar — replaces legend) */
.cal-members{display:flex;justify-content:center;gap:10px;padding:18px 8px 8px;flex-wrap:wrap}
.cal-chip-m{font-size:12px;font-weight:600;padding:6px 14px 6px 6px;gap:8px}
.cal-chip-m img,.cal-chip-m .av,.cal-chip-m .av-em{width:24px;height:24px;border-radius:999px;box-shadow:0 0 0 2px var(--bg)}
/* Legend kept for backward compat but unused */
.cal-legend{display:none}
.cal-strip{cursor:pointer;border-radius:var(--r);background:var(--cd);border:1px solid var(--bd);padding:14px;margin-top:8px;transition:background .15s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.cal-strip:active{background:var(--sf)}
.cal-strip .cal-days{font-size:11px}
.cal-strip .cal-dy{padding:4px 0 2px;min-height:auto}
.cal-strip .cal-bars{min-height:2px}
.cal-strip .cal-ev{height:14px;font-size:8px;line-height:14px;border-radius:3px}
.cal-strip .cal-dh{font-size:9px;padding:0 0 4px;position:static}
.hidden{display:none!important}
</style>
</head>
