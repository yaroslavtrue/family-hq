<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Family HQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0f0f1a;--sf:#1a1a2f;--cd:#212140;--bd:rgba(255,255,255,0.06);--tx:#e8e6f0;--ht:#8785a2;--pr:#7c6aef;--pg:rgba(124,106,239,0.15);--ac:#ef6a7a;--ok:#5cd6a0;--wn:#f0c45a;--gd:linear-gradient(135deg,#7c6aef,#a78bfa);--r:14px;--nh:62px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;padding-bottom:120px}

/* Header */
.hd{padding:16px 20px 12px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-start}
.hd h1{font-size:21px;font-weight:800;letter-spacing:-.5px}
.hd-s{font-size:12px;color:var(--ht);margin-top:2px;font-weight:500}
.hd-r{display:flex;gap:2px;align-items:center}
.hd-g{background:none;border:none;color:var(--ht);cursor:pointer;padding:6px;display:flex}.hd-g svg{width:22px;height:22px}

/* Search bar */
.sb{overflow:hidden;max-height:0;transition:max-height .25s ease,padding .25s ease;background:var(--sf);padding:0 20px;border-bottom:1px solid transparent}
.sb.open{max-height:56px;padding:0 20px 12px;border-bottom-color:var(--bd)}
.sb input{width:100%;padding:10px 16px;border-radius:12px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:14px;outline:none;font-family:inherit}
.sb input:focus{border-color:var(--pr)}.sb input::placeholder{color:var(--ht)}

/* Pull to refresh */
.ptr{text-align:center;height:0;overflow:hidden;transition:height .2s;color:var(--ht);font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:600}
.ptr.show{height:40px}
.ptr .spin{display:inline-block;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Nav */
.nv{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);height:var(--nh);z-index:20;align-items:center}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0 2px;background:none;border:none;color:var(--ht);font-size:9px;font-weight:400;cursor:pointer;transition:all .2s;position:relative;font-family:inherit}
.ni.a{color:var(--pr);font-weight:700}.ni svg{width:21px;height:21px}
.nb{position:absolute;top:0;right:calc(50% - 16px);min-width:15px;height:15px;border-radius:8px;background:var(--ac);color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* Content */
.ct{padding:12px 16px 20px}

/* Section headers */
.sc{font-size:11px;font-weight:700;color:var(--ht);text-transform:uppercase;letter-spacing:1.2px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
.sc .at{text-transform:none;letter-spacing:0;font-size:12px;color:var(--ac);background:none;border:none;cursor:pointer;font-weight:600;font-family:inherit}

/* Cards */
.c{background:var(--cd);border-radius:var(--r);padding:13px 16px;margin-bottom:10px;border:1px solid var(--bd);display:flex;align-items:center;gap:12px;transition:all .25s;animation:ci .25s ease-out}
.c.d{opacity:.4}
@keyframes ci{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Checkboxes */
.cb{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s}
.cb-o{border:2px solid var(--ht)}.cb-k{background:var(--ok)}.cb-k svg{stroke:#fff}
.cb-s{width:20px;height:20px;border-radius:6px}

/* Card content */
.bd{flex:1;min-width:0}
.tt{font-size:15px;font-weight:500;line-height:1.3}
.tt.sk{text-decoration:line-through;color:var(--ht)}
.c-stk{border:1.5px solid var(--ok)}
.mt{font-size:12px;color:var(--ht);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* Badges & chips */
.bg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.ch{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s}
.ch.s{border-color:currentColor}.ch-s{padding:2px 7px;font-size:10px}

/* Buttons */
.bi{background:none;border:none;color:var(--ht);cursor:pointer;padding:5px;border-radius:8px;display:flex;transition:color .2s}.bi svg{width:15px;height:15px}
.btn{width:100%;padding:14px;border-radius:14px;background:var(--gd);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit}
.btn:active{opacity:.9}
.btn-s{background:var(--cd);color:var(--tx);border:1.5px solid var(--bd)}

/* Stats grid */
.sts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.st{background:var(--cd);border-radius:16px;padding:16px 14px;border:1px solid var(--bd);cursor:pointer;transition:transform .15s}
.st:active{transform:scale(.97)}
.sn{font-size:26px;font-weight:800;line-height:1}
.sl{font-size:12px;color:var(--ht);margin-top:5px;font-weight:500}

/* FAB */
.fab{position:fixed;bottom:calc(var(--nh)+24px);right:18px;width:54px;height:54px;border-radius:16px;background:var(--gd);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 24px var(--pg);z-index:15}
.fab:active{transform:scale(.9)}.fab svg{width:22px;height:22px}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;z-index:50;opacity:0;transition:opacity .2s;pointer-events:none}
.mo.op{opacity:1;pointer-events:auto}
.mx{background:var(--sf);border-radius:22px 22px 0 0;padding:22px 22px 36px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1);max-height:85vh;overflow-y:auto}
.mo.op .mx{transform:translateY(0)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt2{font-size:18px;font-weight:700}

/* Form elements */
.inp{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:15px;outline:none;margin-bottom:12px;box-sizing:border-box;font-family:inherit}
.inp:focus{border-color:var(--pr)}.inp::placeholder{color:var(--ht)}
input[type="date"],input[type="time"],input[type="number"],select{-webkit-appearance:none;appearance:none;width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:15px;font-family:inherit;outline:none;box-sizing:border-box;color-scheme:dark}
.ls input[type="date"],.ls input[type="time"],.ls select{color-scheme:light}
.dr{display:flex;gap:10px;margin-bottom:12px}.dr>div{flex:1}
.dl{font-size:12px;color:var(--ht);margin-bottom:6px;font-weight:500}
.lb{font-size:12px;font-weight:600;color:var(--ht);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
.or{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ob{padding:6px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--ht);border:1.5px solid transparent;font-family:inherit}
.ob.s{color:var(--pr);background:color-mix(in srgb,var(--pr),transparent 85%);border-color:color-mix(in srgb,var(--pr),transparent 60%)}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:16px;background:var(--cd);border-radius:12px;padding:3px;border:1px solid var(--bd)}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-radius:10px;transition:all .2s;color:var(--ht);font-family:inherit;border:none;background:none}
.tab.a{background:var(--gd);color:#fff}

/* Filter bar */
.fb2{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fi{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--ht);border:1.5px solid transparent;font-family:inherit}
.fi.a{background:color-mix(in srgb,var(--pr),transparent 85%);color:var(--pr);border-color:color-mix(in srgb,var(--pr),transparent 60%)}

/* Subtasks */
.sbs{margin-top:8px;padding-left:36px}
.si{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--bd)}.si:first-child{border-top:none}
.sx{font-size:13px;flex:1}.sx.dn{text-decoration:line-through;color:var(--ht)}
.sa{display:flex;gap:6px;margin-top:6px;padding-left:36px}
.sa input{flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--bd);background:var(--cd);color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.sa button{padding:8px 12px;border-radius:10px;background:var(--gd);color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.xb{background:none;border:none;color:var(--ht);font-size:11px;cursor:pointer;padding:2px 0;font-family:inherit;font-weight:500}

/* Priority */
.pr{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600}

/* Cleaning zones */
.zn{background:var(--cd);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--bd);animation:ci .25s ease-out}
.zh{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.zi{font-size:28px}.zn2{font-size:16px;font-weight:700;flex:1}
.zs{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.zs.ok{background:color-mix(in srgb,var(--ok),transparent 85%);color:var(--ok)}
.zs.no{background:color-mix(in srgb,var(--ac),transparent 85%);color:var(--ac)}
.zm{font-size:12px;color:var(--ht);margin-bottom:10px}
.zt{display:flex;align-items:center;gap:10px;padding:8px 0}.zt:not(:last-child){border-bottom:1px solid var(--bd)}
.zt-t{font-size:14px;flex:1}.zt-t.dn{text-decoration:line-through;color:var(--ht)}
.za{display:flex;gap:6px;margin-top:8px}
.za input{flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:13px;outline:none;font-family:inherit}
.za button{padding:8px 12px;border-radius:10px;background:var(--gd);color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

/* Onboarding */
.onb{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:30px 20px}
.onb-e{font-size:72px;margin-bottom:16px}.onb-t{font-size:24px;font-weight:800;margin-bottom:8px}
.onb-s{font-size:14px;color:var(--ht);margin-bottom:32px;max-width:280px;line-height:1.5}
.onb-b{width:100%;max-width:300px;padding:16px;border-radius:16px;border:none;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;font-family:inherit}
.onb-b.p{background:var(--gd);color:#fff}.onb-b.s2{background:var(--cd);color:var(--tx);border:1.5px solid var(--bd)}
.cd2{background:var(--cd);border:2px dashed var(--pr);border-radius:16px;padding:20px;margin:16px 0;text-align:center}
.ct2{font-size:32px;font-weight:800;letter-spacing:6px;color:var(--pr)}.cl2{font-size:12px;color:var(--ht);margin-top:8px}
.ci2{width:200px;padding:16px;border-radius:14px;border:2px solid var(--bd);background:var(--cd);color:var(--tx);font-size:24px;font-weight:700;text-align:center;letter-spacing:4px;outline:none;font-family:inherit;text-transform:uppercase}

/* Avatar */
.av{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
.av-em{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* Quantity badge */
.qty{display:inline-flex;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:color-mix(in srgb,var(--wn),transparent 85%);color:var(--wn)}

/* Theme grid */
.tg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.tc{border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center}.te{font-size:24px;margin-bottom:4px}.tn{font-size:12px;font-weight:600}
.td{display:flex;gap:3px;justify-content:center;margin-top:8px}.tdd{width:12px;height:12px;border-radius:50%}

/* Reminders list */
.ri{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:var(--ht);margin-bottom:4px}
.ri input{flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--cd);color:var(--tx);font-size:12px;outline:none;font-family:inherit}

/* Empty state */
.emp{text-align:center;padding:44px 20px;color:var(--ht)}.emp-i{font-size:52px;margin-bottom:12px}.emp-t{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--tx)}

/* Debug panel */
.dbg{position:fixed;bottom:var(--nh);left:0;right:0;background:#1a0000;border-top:2px solid var(--ac);max-height:150px;overflow-y:auto;padding:8px 12px;font-size:11px;color:var(--ac);font-family:monospace;z-index:30;white-space:pre-wrap}
.dbg-cp{position:absolute;top:4px;right:8px;background:var(--ac);color:#fff;border:none;padding:3px 8px;border-radius:6px;font-size:10px;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:calc(var(--nh) + 16px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--cd);color:var(--tx);border:1px solid var(--bd);border-radius:14px;padding:12px 18px;font-size:14px;font-weight:600;z-index:40;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.35);opacity:0;transition:all .3s cubic-bezier(.2,.9,.3,1);pointer-events:none;max-width:calc(100vw - 40px);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast-u{background:var(--pr);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}

/* Hamburger menu */
.menu-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:45;opacity:0;pointer-events:none;transition:opacity .2s}
.menu-ov.open{opacity:1;pointer-events:auto}
.menu-p{position:absolute;top:0;right:0;width:260px;height:100%;background:var(--sf);transform:translateX(100%);transition:transform .25s cubic-bezier(.2,.9,.3,1);padding:20px;padding-top:60px}
.menu-ov.open .menu-p{transform:translateX(0)}
.menu-h{font-size:18px;font-weight:700;margin-bottom:16px}
.menu-i{display:flex;align-items:center;gap:12px;width:100%;padding:14px 12px;border:none;background:none;color:var(--tx);font-size:15px;font-weight:500;cursor:pointer;border-radius:12px;font-family:inherit;text-align:left}
.menu-i:active{background:var(--cd)}
.menu-i span{font-size:20px;width:28px;text-align:center}

/* ═══ v6.6 effects pack — keep lightweight, GPU-only ═══ */

/* Skeleton loaders (shimmer via background-position) */
@keyframes shim{0%{background-position:-300px 0}100%{background-position:300px 0}}
.sk-wrap{padding:12px 0}
.sk-b{background:linear-gradient(90deg,var(--cd) 0%,color-mix(in srgb,var(--cd),white 6%) 50%,var(--cd) 100%);background-size:600px 100%;animation:shim 1.4s ease-in-out infinite;border-radius:12px;border:1px solid var(--bd)}
.sk-sub{height:14px;width:40%;border-radius:6px;margin:6px 0 14px}
.sk-w{height:82px;margin-bottom:16px}
.sk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.sk-st{height:82px;border-radius:16px}
.sk-sc{height:12px;width:30%;border-radius:6px;margin:14px 0 10px}
.sk-c{height:60px;margin-bottom:10px}

/* Weather ambient backgrounds (all CSS, no JS animation loops) */
.wbg{position:relative;overflow:hidden;border-radius:16px;padding:10px 12px;margin:0 -8px 16px;border:1px solid var(--bd);background:color-mix(in srgb,var(--cd),transparent 40%)}
.wbg>*{position:relative;z-index:1}
.wbg::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0}
.wbg-clear::before{background:radial-gradient(circle at 85% 20%,color-mix(in srgb,var(--wn),transparent 55%) 0%,transparent 45%);animation:sunP 5s ease-in-out infinite}
@keyframes sunP{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}
.wbg-cloud::before{background:linear-gradient(180deg,color-mix(in srgb,var(--ht),transparent 82%) 0%,transparent 70%)}
.wbg-rain::before{background:repeating-linear-gradient(105deg,transparent 0,transparent 7px,color-mix(in srgb,var(--pr),transparent 55%) 7px,color-mix(in srgb,var(--pr),transparent 55%) 8px);background-size:40px 40px;animation:rainD .9s linear infinite;opacity:.6}
@keyframes rainD{from{background-position:0 0}to{background-position:-40px 40px}}
.wbg-snow::before{background:radial-gradient(circle 1.5px at 15% 18%,#fff,transparent 60%),radial-gradient(circle 1.5px at 38% 8%,#fff,transparent 60%),radial-gradient(circle 1px at 62% 22%,#fff,transparent 60%),radial-gradient(circle 1.5px at 82% 12%,#fff,transparent 60%),radial-gradient(circle 1px at 25% 55%,#fff,transparent 60%),radial-gradient(circle 1.5px at 55% 45%,#fff,transparent 60%),radial-gradient(circle 1px at 78% 60%,#fff,transparent 60%),radial-gradient(circle 1.5px at 10% 82%,#fff,transparent 60%),radial-gradient(circle 1px at 45% 88%,#fff,transparent 60%),radial-gradient(circle 1.5px at 72% 90%,#fff,transparent 60%);background-size:100% 100%;animation:snowF 8s linear infinite}
@keyframes snowF{from{transform:translateY(-14px)}to{transform:translateY(14px)}}
.wbg-night::before{background:radial-gradient(circle 1px at 12% 22%,#fff,transparent 50%),radial-gradient(circle 1px at 28% 12%,#fff,transparent 50%),radial-gradient(circle 1px at 45% 18%,#fff,transparent 50%),radial-gradient(circle 1px at 62% 8%,#fff,transparent 50%),radial-gradient(circle 1px at 78% 25%,#fff,transparent 50%),radial-gradient(circle 1px at 88% 15%,#fff,transparent 50%),radial-gradient(circle 1px at 20% 45%,#fff,transparent 50%),radial-gradient(circle 1px at 55% 55%,#fff,transparent 50%),radial-gradient(circle 1px at 72% 48%,#fff,transparent 50%),radial-gradient(circle 1px at 38% 72%,#fff,transparent 50%);opacity:.55;animation:twink 3.5s ease-in-out infinite alternate}
@keyframes twink{from{opacity:.3}to{opacity:.75}}
.wbg-storm::before{background:repeating-linear-gradient(108deg,transparent 0,transparent 6px,color-mix(in srgb,var(--ac),transparent 60%) 6px,color-mix(in srgb,var(--ac),transparent 60%) 7px);background-size:42px 42px;animation:rainD .7s linear infinite,lit 6s ease-in-out infinite}
@keyframes lit{0%,91%,100%{filter:brightness(1)}93%{filter:brightness(2.2)}95%{filter:brightness(.8)}96%{filter:brightness(1.9)}}

/* Task complete — spring scale, then slide & fade */
@keyframes tkPop{0%{transform:scale(1)}30%{transform:scale(1.035)}60%{transform:scale(.97)}100%{transform:scale(1)}}
@keyframes tkGo{0%{transform:translateX(0) scale(1);opacity:1;max-height:80px;margin-bottom:10px;padding-top:13px;padding-bottom:13px;border-width:1px}70%{transform:translateX(38px) scale(.98);opacity:.1}100%{transform:translateX(60px) scale(.95);opacity:0;max-height:0;margin-bottom:0;padding-top:0;padding-bottom:0;border-width:0}}
.c.c-pop{animation:tkPop .28s cubic-bezier(.2,.9,.3,1.1)}
.c.c-go{animation:tkGo .42s cubic-bezier(.55,0,.3,1) forwards;overflow:hidden;pointer-events:none}
.cb.cb-k.cb-flash{box-shadow:0 0 0 6px color-mix(in srgb,var(--ok),transparent 70%);transition:box-shadow .3s}

/* Confetti burst (24 shards) */
.cf{position:fixed;width:0;height:0;pointer-events:none;z-index:60}
.cf i{position:absolute;left:-4px;top:-4px;width:7px;height:9px;border-radius:1px;animation:cFly .9s cubic-bezier(.15,.55,.3,1) forwards;will-change:transform,opacity}
@keyframes cFly{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--dx),var(--dy)) rotate(var(--r));opacity:0}}

/* Count-up number wrapper (just inline-block for clean metrics) */
.cu{display:inline-block;font-variant-numeric:tabular-nums}

/* Toggle micro-interactions: spring pop ONLY on actual click (via .pop class), not on re-render */
.ob,.ch,.fi,.tab{transition:background-color .2s,color .2s,border-color .2s,box-shadow .25s;will-change:transform}
.ob.pop,.ch.pop,.fi.pop,.tab.pop{animation:chPop .34s cubic-bezier(.2,.9,.3,1.3)}
@keyframes chPop{0%{transform:scale(.92)}45%{transform:scale(1.08)}72%{transform:scale(.98)}100%{transform:scale(1)}}
.ob:active,.ch:active,.fi:active,.tab:active{transform:scale(.93);transition:transform .08s}

/* Priority colors (semantic — gray / orange / red), override .ob.s default */
:root{--pri-lo:#8a8797;--pri-md:#f08a3c;--pri-hi:#e04656}
.ob-pri-low.s{color:var(--pri-lo);background:color-mix(in srgb,var(--pri-lo),transparent 82%);border-color:color-mix(in srgb,var(--pri-lo),transparent 55%);box-shadow:0 0 0 3px color-mix(in srgb,var(--pri-lo),transparent 88%)}
.ob-pri-normal.s{color:var(--pri-md);background:color-mix(in srgb,var(--pri-md),transparent 82%);border-color:color-mix(in srgb,var(--pri-md),transparent 55%);box-shadow:0 0 0 3px color-mix(in srgb,var(--pri-md),transparent 88%)}
.ob-pri-high.s{color:var(--pri-hi);background:color-mix(in srgb,var(--pri-hi),transparent 80%);border-color:color-mix(in srgb,var(--pri-hi),transparent 50%);box-shadow:0 0 0 3px color-mix(in srgb,var(--pri-hi),transparent 85%)}

/* Calendar */
.cal-mo{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column}
.cal-mo.open{display:flex}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd)}
.cal-hd-t{font-size:17px;font-weight:700}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-nav button{background:none;border:none;color:var(--tx);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:8px}
.cal-nav button:active{background:var(--cd)}
.cal-close{background:none;border:none;color:var(--ht);cursor:pointer;padding:4px}
.cal-body{flex:1;overflow-y:auto;padding:8px 10px 40px}
.cal-dh{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;font-weight:600;color:var(--ht);padding:8px 0;position:sticky;top:0;background:var(--bg);z-index:2;text-transform:uppercase;letter-spacing:.5px}
.cal-wk{margin-bottom:2px;border-bottom:1px solid var(--bd)}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
.cal-dy{padding:6px 0 4px;font-size:12px;font-weight:500;color:var(--ht);min-height:28px}
.cal-dy.cur-m{color:var(--tx)}
.cal-dy.today{color:var(--pr);font-weight:800}
.cal-dy .dn{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%}
.cal-dy.today .dn{background:var(--pr);color:#fff}
.cal-bars{position:relative;min-height:4px;padding:0 1px}
.cal-ev{position:absolute;height:18px;border-radius:4px;font-size:9px;font-weight:600;line-height:18px;padding:0 4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:#fff;cursor:pointer;transition:opacity .15s}
.cal-ev:active{opacity:.7}
.cal-more{position:absolute;text-align:center;font-size:9px;font-weight:700;color:var(--ht);height:14px;line-height:14px}
.cal-dy{cursor:pointer}.cal-dy:active .dn{background:var(--sf)}
.cday-overlay{position:fixed;inset:0;background:var(--bg);z-index:65;display:flex;flex-direction:column;animation:fadeIn .15s}
.cday-panel{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.cday-hd{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--bd)}
.cday-back{background:none;border:none;color:var(--tx);cursor:pointer;padding:4px}
.cday-title{font-size:17px;font-weight:700}
.cday-item{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;margin:0 12px;border-radius:12px;background:var(--cd);margin-top:8px;cursor:pointer;transition:background .15s}
.cday-item:active{background:var(--sf)}
.cday-bd{flex:1;min-width:0}
.cday-tt{font-size:15px;font-weight:600;color:var(--tx);line-height:1.3}
.cday-sub{font-size:12px;color:var(--ht);margin-top:3px}
.cal-ev.ev-pr{background:var(--pr)}.cal-ev.ev-ac{background:var(--ac)}.cal-ev.ev-ok{background:color-mix(in srgb,var(--ok),transparent 30%)}.cal-ev.ev-wn{background:var(--wn);color:#1a1a2f}
.ced-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:70;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .15s}
.ced-card{background:var(--cd);border:1px solid var(--bd);border-radius:16px;padding:20px;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.ced-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ht);margin-bottom:4px}
.ced-title{font-size:17px;font-weight:700;color:var(--tx);margin-bottom:14px;line-height:1.3}
.ced-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--bd)}
.ced-lbl{font-size:12px;color:var(--ht);font-weight:500}
.ced-val{font-size:13px;font-weight:600;color:var(--tx);display:flex;align-items:center;gap:6px}
.ced-val.pr-high{color:var(--wn)}.ced-val.pr-low{color:var(--ht)}
.cal-legend{display:flex;justify-content:center;gap:14px;padding:14px 0 6px;flex-wrap:wrap}
.cal-lg{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--ht)}
.cal-ld{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cal-strip{cursor:pointer;border-radius:14px;background:var(--cd);border:1px solid var(--bd);padding:12px;margin-top:8px;transition:background .15s}
.cal-strip:active{background:var(--sf)}
.cal-strip .cal-days{font-size:11px}
.cal-strip .cal-dy{padding:4px 0 2px;min-height:auto}
.cal-strip .cal-bars{min-height:2px}
.cal-strip .cal-ev{height:14px;font-size:8px;line-height:14px;border-radius:3px}
.cal-strip .cal-dh{font-size:9px;padding:0 0 4px;position:static}
.hidden{display:none!important}
</style>
</head>
<body>

    <div><h1 id="ht">🏠 Family HQ</h1><div class="hd-s" id="hs">Everything at a glance</div></div>
    <div class="hd-r">
